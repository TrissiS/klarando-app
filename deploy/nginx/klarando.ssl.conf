map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream klarando_backend {
  server backend:4000;
}

upstream klarando_web {
  server web:3000;
}

server {
  listen 80 default_server;
  server_name _ 31.70.76.55 klarando.com www.klarando.com app.klarando.com admin.klarando.com orderdesk.klarando.com driver.klarando.com api.klarando.com;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name api.klarando.com;

  ssl_certificate /etc/letsencrypt/live/api.klarando.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.klarando.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location = /api {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://klarando_backend;
  }

  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://klarando_backend;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://klarando_web;
  }
}

