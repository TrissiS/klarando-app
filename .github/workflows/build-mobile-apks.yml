name: Build Mobile Debug APKs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-debug-apks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: mobile_flutter_app
        run: flutter pub get

      - name: Build Customer Debug APK
        working-directory: mobile_flutter_app
        run: flutter build apk --flavor customer -t lib/main.dart --debug --no-shrink

      - name: Build Driver Debug APK
        working-directory: mobile_flutter_app
        run: flutter build apk --flavor driver -t lib/driver_main.dart --debug --no-shrink

      - name: Build OrderDesk Debug APK
        working-directory: mobile_flutter_app
        run: flutter build apk --flavor orderdesk -t lib/orderdesk_main.dart --debug --no-shrink

      - name: Upload Customer Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: klarando-customer-debug.apk
          path: mobile_flutter_app/build/app/outputs/flutter-apk/app-customer-debug.apk
          if-no-files-found: error

      - name: Upload Driver Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: klarando-driver-debug.apk
          path: mobile_flutter_app/build/app/outputs/flutter-apk/app-driver-debug.apk
          if-no-files-found: error

      - name: Upload OrderDesk Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: klarando-orderdesk-debug.apk
          path: mobile_flutter_app/build/app/outputs/flutter-apk/app-orderdesk-debug.apk
          if-no-files-found: error
